<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket 全局监控终端</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .neon-text {
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border-color: rgba(56, 189, 248, 0.3);
        }
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
        .blink-red {
            animation: blink-red 1s infinite;
        }
        .blink-green {
            animation: blink-green 1s infinite;
        }
        @keyframes blink-red {
            0%, 100% { background-color: rgba(239, 68, 68, 0.1); }
            50% { background-color: rgba(239, 68, 68, 0.4); }
        }
        @keyframes blink-green {
            0%, 100% { background-color: rgba(34, 197, 94, 0.1); }
            50% { background-color: rgba(34, 197, 94, 0.4); }
        }
        
        /* Modal Styles */
        .modal {
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }
        .modal.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .modal:not(.hidden) {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        /* 异动标记样式与动画 */
        .alert-marker {
            position: relative;
            width: 24px;
            height: 24px;
            filter: drop-shadow(0 0 6px rgba(255, 80, 80, 0.9));
        }
        .alert-core {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 14px;
            height: 14px;
            transform: translate(-50%, -50%) rotate(45deg);
            background: radial-gradient(circle at 30% 30%, #ff7b7b, #ff1f1f 60%, #b30000 100%);
            border: 2px solid #ffffff;
            border-radius: 2px;
            animation: alert-rotate 1.6s linear infinite;
        }
        .alert-mark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -60%);
            color: #fff;
            font-weight: 900;
            font-size: 10px;
            text-shadow: 0 0 4px rgba(0,0,0,0.6);
            pointer-events: none;
        }
        .alert-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 26px;
            height: 26px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 90, 90, 0.9);
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(255, 60, 60, 0.8);
            animation: alert-pulse 1.2s ease-out infinite;
        }
        @keyframes alert-pulse {
            0%   { transform: translate(-50%, -50%) scale(0.8); opacity: 0.9; }
            60%  { transform: translate(-50%, -50%) scale(1.25); opacity: 0.2; }
            100% { transform: translate(-50%, -50%) scale(1.6); opacity: 0; }
        }
        @keyframes alert-rotate {
            0% { transform: translate(-50%, -50%) rotate(45deg); }
            100% { transform: translate(-50%, -50%) rotate(405deg); }
        }
    </style>
</head>
<body class="min-h-screen p-6">
    <div class="max-w-[1600px] mx-auto space-y-6">
        <!-- 头部 -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex items-center space-x-4">

                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-300 neon-text">
                    Polymarket 全局风控终端
                </h1>
            </div>
            <div class="flex items-center space-x-4 text-sm text-slate-400">

                </button>

            </div>
        </header>

        <!-- 异动监控面板 (已移除) -->
        <!-- <div id="anomaly-panel" ...></div> -->

        <!-- 世界地图 -->
        <div class="card p-1 rounded-xl overflow-hidden relative group">

                <h2 class="text-lg font-bold text-cyan-400 flex items-center gap-2">
                    <span>🌍</span> 全球热门事件分布
                </h2>
            </div>

            <!-- 地图图例 -->

                <div id="legend-content">

                    </div>

                    <!-- 分类颜色图例 -->
                    <div class="mb-2">
                        <div class="font-medium mb-1 text-slate-400">政治与地缘</div>
                        <div class="grid grid-cols-2 gap-x-1 gap-y-1">
                            <div class="flex items-center gap-1.5"><div style="width:6px;height:6px;background:#ef4444;border-radius:50%"></div>美政</div>
                            <div class="flex items-center gap-1.5"><div style="width:6px;height:6px;background:#ec4899;border-radius:50%"></div>国际</div>

                    </div>

                    <!-- 概率颜色图例 -->

            </div>
            <div id="world-map" class="w-full h-[400px] bg-slate-900"></div>
        </div>

        <!-- 配置栏 -->
        <div class="card p-6 rounded-xl">
            <div class="flex flex-wrap gap-4 items-end">
                <div class="w-48">
                    <label class="block text-sm font-medium text-slate-400 mb-2">监控前 N 个热门事件</label>
                    <input type="number" id="limit-input" value="20" min="1" max="100"

                </div>

                </div>
                <button onclick="updateConfig()"

                    应用全网监控配置

        <!-- 筛选与排序栏 -->
        <div class="card p-4 rounded-xl flex flex-wrap gap-4 items-center justify-between">

                <button onclick="setCategory('all')" class="category-btn px-4 py-2 rounded-lg bg-cyan-600 text-white font-medium transition-colors" data-category="all">全部</button>
                <button onclick="setCategory('地缘政治')" class="category-btn px-4 py-2 rounded-lg bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white transition-colors" data-category="地缘政治">🌍 地缘政治</button>
                <button onclick="setCategory('政治')" class="category-btn px-4 py-2 rounded-lg bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white transition-colors" data-category="政治">🏛️ 政治</button>
                <button onclick="setCategory('加密货币')" class="category-btn px-4 py-2 rounded-lg bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white transition-colors" data-category="加密货币">💰 加密货币</button>
                <button onclick="setCategory('体育')" class="category-btn px-4 py-2 rounded-lg bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white transition-colors" data-category="体育">⚽ 体育</button>
                <button onclick="setCategory('经济科技')" class="category-btn px-4 py-2 rounded-lg bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white transition-colors" data-category="经济科技">📈 经济科技</button>

            </div>

            <!-- 搜索与排序 -->
            <div class="flex items-center gap-4">

                <div class="h-6 w-px bg-slate-700"></div>
                <div class="flex items-center gap-2">

                <select id="sort-select" onchange="setSort(this.value)" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-cyan-500">

                        <span class="text-cyan-400 mr-2">📊</span> 热门事件概览
                    </h2>
                    <div id="events-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <!-- 动态插入事件卡片 -->
                    </div>

    <!-- 搜索模态框 -->
    <div id="search-modal" class="modal hidden fixed inset-0 z-[1000] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-2xl rounded-xl shadow-2xl flex flex-col max-h-[80vh]">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center">
                <h3 class="text-lg font-bold text-white">🔍 搜索 Polymarket 事件</h3>
                <button onclick="closeSearchModal()" class="text-slate-400 hover:text-white text-2xl">&times;</button>
            </div>
            <div class="p-4 border-b border-slate-800 bg-slate-800/50">
                <div class="relative">
                    <input type="text" id="search-input" placeholder="输入关键词 (如: Trump, Bitcoin, Rate cut...)" 
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg pl-10 pr-4 py-3 text-white focus:outline-none focus:border-cyan-500"
                        onkeydown="if(event.key === 'Enter') searchEvents()">
                    <span class="absolute left-3 top-3.5 text-slate-500">🔎</span>

                        搜索
                    </button>
                </div>
            </div>
            <div id="search-results" class="flex-1 overflow-y-auto p-4 space-y-3 min-h-[200px]">
                <div class="text-center text-slate-500 py-10">请输入关键词进行搜索</div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        
        // 全局状态
        let allEvents = [];
        let currentCategory = 'all';
        let currentSort = 'volume';
        let map;
        let markers = { hot: [], anomaly: [] };
        let markerClusterGroup;
        let isNotificationEnabled = false; // 通知开关状态
        let priceHistory = {};
        const MAX_HISTORY_POINTS = 20;

        // 分类组定义 (用于筛选)
        const categoryGroups = {
            '政治': ['美国政治', '国际政治', '政治', '全球选举', '美国大选'],
            '加密货币': ['比特币', '以太坊', '加密货币', 'NFT'],
            '体育': ['足球', '篮球', '橄榄球', '体育', '网球', 'NFL橄榄球', 'NBA篮球'],
            '经济科技': ['金融经济', '科技', '商业', '科学', '人工智能', '经济'],
            '其他': ['娱乐', '其他', '流行文化', '气候变化']
        };

        // 分类颜色配置
        const categoryColors = {
            // 政治类
            '美国政治': { text: 'text-red-400', bg: 'bg-red-900/50', border: 'border-red-700', dot: '#ef4444' },
            '国际政治': { text: 'text-pink-400', bg: 'bg-pink-900/50', border: 'border-pink-700', dot: '#ec4899' },
            '政治': { text: 'text-rose-400', bg: 'bg-rose-900/50', border: 'border-rose-700', dot: '#e11d48' },
            
            // 加密货币
            '比特币': { text: 'text-orange-400', bg: 'bg-orange-900/50', border: 'border-orange-700', dot: '#f97316' },
            '以太坊': { text: 'text-indigo-400', bg: 'bg-indigo-900/50', border: 'border-indigo-700', dot: '#6366f1' },
            '加密货币': { text: 'text-violet-400', bg: 'bg-violet-900/50', border: 'border-violet-700', dot: '#8b5cf6' },
            
            // 体育
            '足球': { text: 'text-emerald-400', bg: 'bg-emerald-900/50', border: 'border-emerald-700', dot: '#10b981' },
            '篮球': { text: 'text-cyan-400', bg: 'bg-cyan-900/50', border: 'border-cyan-700', dot: '#06b6d4' },
            '橄榄球': { text: 'text-teal-400', bg: 'bg-teal-900/50', border: 'border-teal-700', dot: '#14b8a6' },
            '体育': { text: 'text-blue-400', bg: 'bg-blue-900/50', border: 'border-blue-700', dot: '#3b82f6' },
            
            // 其他
            '地缘政治': { text: 'text-purple-400', bg: 'bg-purple-900/50', border: 'border-purple-700', dot: '#7e22ce' },
            '金融经济': { text: 'text-yellow-400', bg: 'bg-yellow-900/50', border: 'border-yellow-700', dot: '#eab308' },
            '科技': { text: 'text-sky-400', bg: 'bg-sky-900/50', border: 'border-sky-700', dot: '#0ea5e9' },
            '娱乐': { text: 'text-fuchsia-400', bg: 'bg-fuchsia-900/50', border: 'border-fuchsia-700', dot: '#d946ef' },
            '商业': { text: 'text-lime-400', bg: 'bg-lime-900/50', border: 'border-lime-700', dot: '#84cc16' },
            '其他': { text: 'text-slate-400', bg: 'bg-slate-800', border: 'border-slate-600', dot: '#64748b' }
        };

        const styleMap = {
            '全球选举': '国际政治',
            '美国大选': '美国政治',
            'NFT': '加密货币',
            '网球': '体育',
            'NFL橄榄球': '橄榄球',
            'NBA篮球': '篮球',
            '科学': '科技',
            '人工智能': '科技',
            '经济': '金融经济',
            '流行文化': '娱乐',
            '气候变化': '地缘政治'
        };

        function getCategoryStyle(category) {
            const mappedCategory = styleMap[category] || category;
            return categoryColors[mappedCategory] || categoryColors['其他'];
        }

        // 简单的字符串哈希函数
        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = (hash << 5) - hash + char;
                hash = hash & hash; // Convert to 32bit integer
            }
            return hash;
        }

        // 确定性随机数生成器 (基于种子)
        function seededRandom(seed) {
            const x = Math.sin(seed++) * 10000;
            return x - Math.floor(x);
        }

        // 地理位置映射表
        const geoMap = {
            'Tehran': [35.6892, 51.3890],
            'Iran': [32.4279, 53.6880],
            'Israel': [31.0461, 34.8516],
            'Jerusalem': [31.7683, 35.2137],
            'Gaza': [31.5, 34.4667],
            'Lebanon': [33.8547, 35.8623],

        function initMap() {
            // 初始化地图，设置默认中心为大西洋中心，以便展示欧美
            map = L.map('world-map', {
                center: [20, 0],
                zoom: 2,
                zoomControl: false,
                attributionControl: false
            });

            // 提升异动标记的层级，确保永远显示在最上层
            map.createPane('alerts');
            map.getPane('alerts').style.zIndex = 650; // 默认 markerPane 为 600
            map.getPane('alerts').style.pointerEvents = 'auto';

            // 使用 CartoDB Dark Matter 瓦片 (深色风格)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(map);

            // 初始化聚合层
            markerClusterGroup = L.markerClusterGroup({
                showCoverageOnHover: false,
                maxClusterRadius: 40,
                iconCreateFunction: function(cluster) {
                    const count = cluster.getChildCount();
                    let size = count < 10 ? 'small' : count < 30 ? 'medium' : 'large';
                    return L.divIcon({ 
                        html: `<div class="bg-slate-800/80 border border-slate-600 rounded-full w-8 h-8 flex items-center justify-center text-white font-bold text-xs">${count}</div>`, 
                        className: 'my-cluster-icon', 
                        iconSize: L.point(30, 30) 
                    });
                }
            });
            map.addLayer(markerClusterGroup);
        }

        function getEventLocation(event) {
            const title = event.title || event.eventTitle || "";
            
            // 1. 优先尝试关键词匹配
            for (const [key, coords] of Object.entries(geoMap)) {
                if (title.includes(key)) {
                    // 使用标题哈希作为随机种子，确保同一事件位置固定
                    const seed = simpleHash(title);
                    // 在基准坐标附近添加微小偏移 (±2度)
                    const lat = coords[0] + (seededRandom(seed) - 0.5) * 4;
                    const lng = coords[1] + (seededRandom(seed + 1) - 0.5) * 4;
                    return [lat, lng];
                }
            }
            
            // 2. 默认随机分布 (基于标题哈希，固定位置，默认落在美国)
            const seed = simpleHash(title);
            // 美国大致范围: Lat 25~49, Lng -125~-67
            const lat = 25 + (seededRandom(seed) * 24); 
            const lng = -125 + (seededRandom(seed + 1) * 58);
            return [lat, lng];
        }

        function updateMapMarkers() {
            if (!map || !markerClusterGroup) return;

            // 清除旧的 Hot Markers
            markerClusterGroup.clearLayers();
            markers.hot = [];

            // 添加新的 Hot Markers (Top 50 by Volume to show more distribution)
            const topEvents = [...allEvents]
                .sort((a, b) => b.volume - a.volume)
                .slice(0, 50);

            topEvents.forEach(event => {
                const loc = getEventLocation(event);
                
                // 根据分类选择颜色
                const style = getCategoryStyle(event.category_cn);
                const color = style.dot;

                const iconHtml = `<div style="background-color: ${color}; width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 0 8px ${color}; border: 2px solid rgba(0,0,0,0.3);"></div>`;

                const customIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: iconHtml,
                    iconSize: [12, 12],
                    iconAnchor: [6, 6]
                });

                const cands = getPopupCandidates(event);
                const rows = cands.map(c => {
                    const cid = `spark_${event.id}_${c.marketId}_${sanitizeId(c.outcome)}`;
                    return `
                        <div class="flex items-center justify-between gap-2 py-1">
                            <div class="flex-1 min-w-0">
                                <div class="truncate">${c.label}</div>
                            </div>

                        </div>
                        <div class="w-full h-[28px] mb-1">
                            <canvas id="${cid}" height="28"></canvas>
                        </div>
                    `;
                }).join('');
                const popupHtml = `
                    <div class="text-slate-900 text-xs font-bold max-w-[260px]">
                        <div class="text-sm mb-1">${event.title}</div>
                        <div class="text-[10px] px-1 rounded inline-block text-white mb-1" style="background:${color}">${event.category_cn}</div>
                        <div class="text-slate-500 mb-1 font-normal line-clamp-3">${event.description || ''}</div>
                        <div class="text-slate-800 mb-1">Vol: $${formatVolume(event.volume)}</div>
                        <div class="text-slate-600 mb-1">选项与概率</div>
                        ${rows || '<div class="text-slate-500">暂无选项数据</div>'}
                    </div>
                `;

                const marker = L.marker(loc, { icon: customIcon }).bindPopup(popupHtml);
                marker.on('popupopen', () => {
                    const styleC = getCategoryStyle(event.category_cn);
                    const cc = styleC.dot;
                    cands.forEach(c => {
                        const cid = `spark_${event.id}_${c.marketId}_${sanitizeId(c.outcome)}`;
                        const el = document.getElementById(cid);
                        if (!el) return;
                        const series = getHistorySeries(c.marketId, c.outcome);
                        renderSparkline(el, series, cc);
                    });
                });
                
                markerClusterGroup.addLayer(marker);
                markers.hot.push(marker);
            });
        }

        function addAnomalyMarker(alertData) {
            if (!map) return;

            const loc = getEventLocation(alertData);
            
            // 红色菱形核心 + 外圈脉冲 + “!” 标记，且置于 alerts pane 顶层

                className: 'custom-div-icon',

                iconSize: [28, 28],
                iconAnchor: [14, 14]

            const marker = L.marker(loc, { icon: redIcon, zIndexOffset: 4000, pane: 'alerts' })
                .bindPopup(`
                    <div class="text-slate-900 text-xs font-bold">
                        <div class="text-red-600 mb-1">⚠️ ${alertData.eventTitle}</div>
                        <div class="mb-1">${alertData.outcome}: ${alertData.percentChange}%</div>
                        <div class="text-slate-500 font-normal">Time: ${alertData.time}</div>
                    </div>
                `)
                .addTo(map);

            // 自动打开 Popup
            marker.openPopup();

            // 存入 anomaly 列表
            markers.anomaly.push(marker);

            // 10秒后自动移除异动标记
            setTimeout(() => {
                map.removeLayer(marker);
                markers.anomaly = markers.anomaly.filter(m => m !== marker);
            }, 10000);
            
            // 移动地图视角到异动点
            map.flyTo(loc, 4, { duration: 1.5 });
        }

        function toggleNotifications() {
            if (!("Notification" in window)) {
                alert("此浏览器不支持桌面通知");
                return;
            }

            if (Notification.permission === "granted") {
                // 如果已经授权，则切换开关状态
                isNotificationEnabled = !isNotificationEnabled;
                updateNotificationBtn();
                
                if (isNotificationEnabled) {
                    new Notification("Polymarket 监控", { body: "桌面通知已启用！" });
                }
            } else if (Notification.permission !== "denied") {
                // 如果未授权，则请求权限
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        isNotificationEnabled = true;
                        updateNotificationBtn();
                        new Notification("Polymarket 监控", { body: "桌面通知已启用！" });
                    }
                });
            }
        }

        function updateNotificationBtn() {
            const btn = document.getElementById('notify-btn');
            if (isNotificationEnabled) {
                btn.innerHTML = '🔔 通知已开启';
                btn.classList.remove('text-slate-300', 'bg-slate-800', 'border-slate-700');
                btn.classList.add('text-white', 'bg-green-600', 'border-green-500');

        function sanitizeId(s) {
            return String(s || '').replace(/[^a-zA-Z0-9_-]/g, '_');
        }

        function updatePriceHistory(events) {
            if (!Array.isArray(events)) return;
            events.forEach(ev => {
                const markets = ev.markets || [];
                markets.forEach(m => {
                    const outs = m.outcomes || [];
                    outs.forEach(o => {
                        const key = `${m.id}::${o.name}`;
                        const v = parseFloat(o.percent);
                        if (isNaN(v)) return;
                        if (!priceHistory[key]) priceHistory[key] = [];
                        priceHistory[key].push({ t: Date.now(), p: v });
                        if (priceHistory[key].length > MAX_HISTORY_POINTS) priceHistory[key].shift();
                    });
                });
            });
        }

        function getHistorySeries(marketId, outcome) {
            const key = `${marketId}::${outcome}`;
            const arr = priceHistory[key] || [];
            return arr.map(x => x.p);
        }

        function renderSparkline(canvasEl, data, color) {
            const ctx = canvasEl.getContext('2d');
            const labels = data.map((_, i) => i + 1);
            const ds = data.length > 0 ? data : [0];
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: ds,
                        borderColor: color,
                        backgroundColor: 'rgba(0,0,0,0)',
                        borderWidth: 1,
                        tension: 0.25,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: { enabled: false } },
                    scales: {
                        x: { display: false },
                        y: { display: false, suggestedMin: 0, suggestedMax: 100 }
                    },
                    elements: { line: { fill: false } }
                }
            });
        }

        function getPopupCandidates(event) {
            const mkts = event.markets || [];
            if (mkts.length === 0) return [];
            const first = mkts[0];
            const names = (first.outcomes || []).map(o => o.name);
            const isBinary = names.includes('Yes') && names.includes('No');
            let items = [];
            if (isBinary && mkts.length > 1) {
                items = mkts.map(m => {
                    const yes = (m.outcomes || []).find(o => o.name === 'Yes');
                    let label = m.question || '';
                    if (event.title && label.includes(event.title)) {
                        label = label.replace(event.title, '').replace(/^[:：\\-–—\\s]+/, '').trim() || (m.question || '');
                    }
                    return { label: label || `选项 ${m.id}`, percent: parseFloat((yes && yes.percent) || 0), marketId: m.id, outcome: 'Yes' };
                });
            } else {
                const m = first;
                items = (m.outcomes || []).map(o => ({ label: o.name, percent: parseFloat(o.percent || 0), marketId: m.id, outcome: o.name }));
            }
            items = items.filter(i => !isNaN(i.percent));
            items.sort((a, b) => b.percent - a.percent);
            return items.slice(0, 4);
        }

        window.toggleWatchlist = async function(id, btnElement) {
            let isRemoving = false;
            
            if (btnElement) {
                const text = btnElement.textContent.trim();
                if (text === '移除' || text === '⭐') {
                    isRemoving = true;
                }
            }
            
            // 乐观 UI 更新
            if (btnElement) {
                btnElement.style.opacity = '0.5';
                btnElement.disabled = true;
            }

            try {
                const method = isRemoving ? 'DELETE' : 'POST';
                const res = await fetch('/api/watchlist', {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                
                if (res.ok) {
                    // 更新按钮状态
                    if (btnElement) {
                        btnElement.style.opacity = '1';
                        btnElement.disabled = false;
                        
                        // 模态框按钮
                        if (btnElement.classList.contains('px-3')) {
                             if (isRemoving) {
                                btnElement.className = 'px-3 py-1.5 rounded text-sm font-medium transition-colors bg-cyan-900/30 text-cyan-400 border border-cyan-800 hover:bg-cyan-900/50';
                                btnElement.textContent = '添加监控';
                             } else {
                                btnElement.className = 'px-3 py-1.5 rounded text-sm font-medium transition-colors bg-red-900/30 text-red-400 border border-red-800 hover:bg-red-900/50';
                                btnElement.textContent = '移除';
                             }
                        } 
                        // 星号图标
                        else {
                            if (isRemoving) {
                                btnElement.textContent = '☆';
                                btnElement.title = '加入自选';
                                // 更新本地模型
                                const ev = allEvents.find(e => e.id === id);
                                if(ev) ev.isWatchlist = false;
                            } else {
                                btnElement.textContent = '⭐';
                                btnElement.title = '移出自选';
                                const ev = allEvents.find(e => e.id === id);
                                if(ev) ev.isWatchlist = true;
                            }
                        }
                    }
                    
                    // 如果在自选 Tab 移除了项目，立即刷新列表
                    if (currentCategory === 'watchlist' && isRemoving) {
                        const ev = allEvents.find(e => e.id === id);
                        if(ev) ev.isWatchlist = false; // 确保 renderEvents 过滤掉它
                        renderEvents();
                    }
                }
            } catch (error) {
                alert('操作失败: ' + error.message);
                if (btnElement) btnElement.disabled = false;
            }
        }

        function renderEvents() {
            let events = [...allEvents];
            
            // 1. 过滤
            if (currentCategory === 'watchlist') {
                events = events.filter(e => e.isWatchlist);
            } else if (currentCategory !== 'all') {
                if (categoryGroups[currentCategory]) {
                    events = events.filter(e => categoryGroups[currentCategory].includes(e.category_cn));
                } else {
                    events = events.filter(e => e.category_cn === currentCategory);
                }
            }
            
            // 2. 排序
            events.sort((a, b) => {
                if (currentSort === 'volume') {
                    return (b.volume || 0) - (a.volume || 0);
                } else if (currentSort === 'liquidity') {
                    return (b.liquidity || 0) - (a.liquidity || 0);
                } else if (currentSort === 'hot') {
                    const hotA = (a.volume || 0) + ((a.liquidity || 0) * 10);
                    const hotB = (b.volume || 0) + ((b.liquidity || 0) * 10);
                    return hotB - hotA;
                }
                return 0;
            });
            
            const container = document.getElementById('events-grid');
            
            if (events.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center text-slate-500 py-10">暂无此类事件</div>`;
                return;
            }
            
            // 保持现有卡片状态
            container.innerHTML = events.map(event => {
                // 使用后端计算好的 displayCandidates
                const candidates = event.displayCandidates || [];
                
                // 优先显示英文标题 (如果有中文翻译作为辅助)
                const displayTitle = event.title;
                const subTitle = event.title_cn ? `<div class="text-xs text-slate-500 truncate mt-1" title="${event.title_cn}">${event.title_cn}</div>` : '';
                const isWatchlist = event.isWatchlist;
                
                // Expiration display
                let expiryDisplay = '';
                if (event.endDate) {
                    const endDate = new Date(event.endDate);
                    const now = new Date();
                    const diffTime = endDate - now;
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    
                    if (diffDays > 0) {
                        expiryDisplay = `<span class="text-[10px] text-slate-400 bg-slate-900 px-2 py-0.5 rounded border border-slate-700">⏳ ${diffDays}天后截止</span>`;
                    } else {
                        expiryDisplay = `<span class="text-[10px] text-red-400 bg-red-900/20 px-2 py-0.5 rounded border border-red-900">🛑 已截止</span>`;
                    }
                }

                // Category color mapping for border/badge
                const style = getCategoryStyle(event.category_cn);
                const categoryColorClass = `${style.text} ${style.border}`;
                const categoryBgClass = style.bg;

                return `
                <div class="bg-slate-800/50 rounded-lg p-4 border border-slate-700 hover:border-slate-500 transition-colors flex flex-col relative overflow-hidden group shadow-lg">
                    <div class="absolute top-0 right-0 p-2 opacity-70 group-hover:opacity-100 transition-opacity z-10 flex gap-2">
                         ${expiryDisplay}
                        <span class="text-[10px] px-2 py-0.5 rounded-full ${categoryBgClass} ${categoryColorClass} border">
                            ${event.category_cn || '其他'}
                        </span>
                    </div>

                     <!-- Watchlist Toggle -->
                    <button onclick="toggleWatchlist('${event.id}', this)" class="absolute top-0 left-0 p-2 opacity-50 hover:opacity-100 transition-opacity z-10 text-lg focus:outline-none hover:scale-110 transform duration-200" title="${isWatchlist ? '移出自选' : '加入自选'}">
                        ${isWatchlist ? '⭐' : '☆'}
                    </button>
                    
                    <div class="mb-3 pr-2 pl-8 pt-1">
                        <h3 class="font-bold text-sm text-slate-100 line-clamp-2 leading-tight hover:text-cyan-400 transition-colors cursor-pointer" title="${event.title}">
                            ${displayTitle}
                        </h3>
                        ${subTitle}
                    </div>
                    
                    <div class="flex items-center gap-2 mb-3 text-xs text-slate-500 font-mono">
                         <span class="bg-slate-900/80 px-2 py-0.5 rounded text-cyan-500 border border-slate-800">Vol: $${formatVolume(event.volume || 0)}</span>
                         ${event.liquidity ? `<span class="bg-slate-900/80 px-2 py-0.5 rounded text-emerald-500 border border-slate-800">Liq: $${formatVolume(event.liquidity)}</span>` : ''}
                    </div>
                    
                    <div class="space-y-2 flex-1">
                        ${candidates.map(item => {
                            const percent = parseFloat(item.percent);
                            const barColor = percent > 50 ? 'bg-green-500' : percent > 20 ? 'bg-blue-500' : 'bg-slate-600';
                            return `
                            <div class="relative text-xs bg-slate-900/40 rounded overflow-hidden hover:bg-slate-900/60 transition-colors group/item">
                                <!-- Progress Bar Background -->
                                <div class="absolute top-0 left-0 h-full ${barColor} opacity-20 group-hover/item:opacity-30 transition-opacity" style="width: ${percent}%"></div>
                                
                                <div class="relative flex justify-between items-center p-2 z-10">
                                    <span class="text-slate-300 truncate mr-2 max-w-[65%]" title="${item.name}">${translateOutcome(item.name)}</span>
                                    <span class="font-mono font-bold ${getPriceColor(item.price)} bg-slate-900/80 px-1.5 rounded">
                                        ${item.percent}%
                                    </span>
                                </div>
                            </div>
                        `}).join('')}
                    </div>
                </div>
            `}).join('');
        }
        
        function translateOutcome(name) {
            // 简单翻译常用选项
            if (name === 'Yes') return '是 (Yes)';
            if (name === 'No') return '否 (No)';
            return name;
        }

        function formatVolume(vol) {
            if (vol >= 1000000) return (vol / 1000000).toFixed(1) + 'M';
            if (vol >= 1000) return (vol / 1000).toFixed(1) + 'K';
            return Math.floor(vol);
        }

        function getPriceColor(price) {
            if (price > 0.7) return 'text-green-400';
            if (price < 0.3) return 'text-red-400';
            return 'text-blue-400';
        }

        function addAlert(data) {
            const container = document.getElementById('alerts-container');
            const emptyState = container.querySelector('.text-center');
            if (emptyState) emptyState.remove();

            const alertEl = document.createElement('div');
            
            if (data.type === 'error') {
                alertEl.className = 'bg-red-900/20 border-l-4 border-red-500 p-3 rounded text-sm text-red-200 mb-2';
                alertEl.textContent = data.message;
            } else {
                const isUp = data.direction === '上涨';
                // 添加闪烁效果
                alertEl.className = `p-3 rounded border-l-4 ${isUp ? 'border-green-500 blink-green' : 'border-red-500 blink-red'} text-sm mb-2 transition-all`;
                
                alertEl.innerHTML = `
                    <div class="flex justify-between text-xs text-slate-400 mb-1">
                        <span>${data.time}</span>
                        <span class="${isUp ? 'text-green-400' : 'text-red-400'} font-bold text-base">${data.direction} ${data.percentChange}%</span>
                    </div>
                    <div class="font-bold text-white mb-1 line-clamp-2">${data.eventTitle}</div>
                    <div class="text-xs text-cyan-300 mb-1">${data.outcome}</div>
                    <div class="flex justify-between items-center text-xs bg-slate-900/50 p-1 rounded mt-1">
                        <span class="text-slate-500">前: ${data.oldPrice}</span>
                        <span class="text-slate-300">➜</span>
                        <span class="text-white font-mono">现: ${data.newPrice}</span>
                    </div>
                `;
                
                // 3秒后移除闪烁动画
                setTimeout(() => {
                    alertEl.classList.remove('blink-red', 'blink-green');
                    alertEl.classList.add('bg-slate-800');
                }, 3000);
            }

            container.insertBefore(alertEl, container.firstChild);
            
            // 限制警报数量，防止页面卡顿
            if (container.children.length > 50) {
                container.lastChild.remove();
            }
        }

        function clearAlerts() {
            const container = document.getElementById('alerts-container');
            container.innerHTML = '<div class="text-center text-slate-600 py-10">等待异动触发...</div>';
        }

        function updateConfig() {
            const limit = document.getElementById('limit-input').value;
            const interval = document.getElementById('interval-input').value * 1000;
            const threshold = document.getElementById('threshold-input').value / 100;

            fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ limit, interval, threshold })
            })
            .then(res => res.json())
            .then(data => {
                alert('全局监控配置已更新！系统将重启监控任务。');
                // 清空当前列表等待新数据
                document.getElementById('events-grid').innerHTML = '';
            });
        }
    </script>
</body>
</html>
